# Wixen Terminal — Default Configuration
#
# This file documents every configuration option with its default value.
# Copy this file to %APPDATA%\wixen\config.toml and edit to taste.
# In portable mode, place it next to the executable as config.toml.

# ─── Font ────────────────────────────────────────────────────────────────────

[font]
# Font family name (DirectWrite lookup).
family = "Cascadia Code"
# Font size in points (valid range: 4.0 – 128.0).
size = 14.0
# Line height multiplier (valid range: 0.5 – 3.0). 1.0 = tight, 1.2 = comfortable.
line_height = 1.0
# Fallback font families tried when the primary font lacks a glyph.
fallback_fonts = ["Segoe UI Emoji", "Segoe UI Symbol", "MS Gothic"]
# Enable programming ligatures (e.g., =>, ->, != in Fira Code / Cascadia Code).
ligatures = true
# Path to a font file (.ttf/.otf) to load directly instead of by family name.
# When non-empty, this takes priority over `family`.
font_path = ""

# ─── Window ──────────────────────────────────────────────────────────────────

[window]
# Initial window width in pixels (minimum: 100).
width = 1024
# Initial window height in pixels (minimum: 100).
height = 768
# Window title.
title = "Wixen Terminal"
# Renderer: "auto", "gpu", or "software".
renderer = "auto"
# Window opacity (0.0 = fully transparent, 1.0 = fully opaque).
opacity = 1.0
# Window background style: "opaque", "acrylic", or "mica".
# Acrylic and Mica require Windows 11 22H2+.
background = "opaque"
# Use dark title bar decoration.
dark_title_bar = true
# Path to a background image (empty = none). Supports PNG, JPEG, GIF.
background_image = ""
# Background image opacity (0.0 = invisible, 1.0 = fully opaque).
background_image_opacity = 0.3
# Enable quake-mode: a global hotkey toggles the terminal window.
quake_mode = false
# Quake-mode global hotkey chord.
quake_hotkey = "win+backtick"
# Scrollbar display mode: "auto" (when scrolled), "always", or "never".
scrollbar = "auto"
# Tab bar display mode: "auto-hide" (2+ tabs), "always", or "never".
tab_bar = "auto-hide"

# Terminal content padding in pixels (space between window edge and terminal grid).
[window.padding]
left = 4
right = 4
top = 4
bottom = 4

# ─── Terminal ────────────────────────────────────────────────────────────────

[terminal]
# Maximum scrollback lines (0 = infinite).
scrollback_lines = 0
# Cursor style: "block", "underline", or "bar".
cursor_style = "block"
# Whether the cursor blinks.
cursor_blink = true
# Cursor blink interval in milliseconds (valid range: 100 – 5000).
cursor_blink_ms = 530
# Bell style: "audible", "visual", "both", or "none".
bell = "both"
# OSC 52 clipboard access policy: "write-only", "read-write", or "disabled".
# Write-only is the safe default — full read access could let a malicious
# program silently exfiltrate clipboard contents.
osc52 = "write-only"
# Notify when a command finishes after running for at least this many seconds
# and the window is not focused. 0 disables the notification.
command_notify_threshold = 10
# Session restore mode: "never", "always", or "ask".
session_restore = "never"

# ─── Colors ──────────────────────────────────────────────────────────────────

[colors]
# Built-in theme name (e.g., "dracula", "catppuccin-mocha").
# If set, provides base colors; individual fields below override the theme.
# theme = "dracula"
# Foreground color as #RRGGBB hex.
foreground = "#d9d9d9"
# Background color as #RRGGBB hex.
background = "#0d0d14"
# Cursor color as #RRGGBB hex.
cursor = "#cccccc"
# Selection background color as #RRGGBB hex.
selection_bg = "#264f78"
# ANSI 16-color palette overrides (indexed 0–15). Empty = use defaults.
palette = []

# ─── Shell ───────────────────────────────────────────────────────────────────

[shell]
# Shell program to launch (empty = auto-detect).
program = ""
# Arguments to pass to the shell.
args = []
# Working directory (empty = inherit from parent process).
working_directory = ""

# ─── Keybindings ─────────────────────────────────────────────────────────────

[keybindings]

# Each binding has a chord (key combination) and an action.
# Optional `args` field for actions that take a parameter (e.g., send_text).
# Modifier order is normalized: alt+ctrl+shift+win (alphabetical).

