# ─── Profiles ────────────────────────────────────────────────────────────────
#
# Named shell profiles. If empty, a single profile is synthesized from [shell].
# Example:
#
# [[profiles]]
# name = "PowerShell"
# program = "pwsh.exe"
# args = ["-NoLogo"]
# working_directory = ""
# is_default = true
#
# [[profiles]]
# name = "Command Prompt"
# program = "cmd.exe"
# args = []
# working_directory = ""
# is_default = false

# ─── SSH Targets ─────────────────────────────────────────────────────────────
#
# SSH connection targets. Example:
#
# [[ssh]]
# name = "dev-server"
# host = "dev.example.com"
# port = 22
# user = "deploy"

# ── Accessibility ────────────────────────────────────────────────────────────
[accessibility]
# How much output the screen reader announces: auto, all, commands-only, errors-only, silent
screen_reader_output = "auto"
# Announce when commands complete (includes exit code and output line count)
announce_command_complete = true
# Include exit codes in completion announcements
announce_exit_codes = true
# UIA live region politeness: "polite" (queues) or "assertive" (interrupts)
live_region_politeness = "polite"
# Prompt detection strategy: auto, shell-integration, heuristic, disabled
prompt_detection = "auto"
# High contrast mode: "auto" (follow Windows), "on", "off"
high_contrast = "auto"
# Minimum foreground/background contrast ratio (WCAG AA = 4.5, AAA = 7.0)
min_contrast_ratio = 4.5
# Reduced motion: "auto" (follow Windows), "on", "off"
reduced_motion = "auto"
# Announce inline images when placed (protocol, dimensions, filename if available)
announce_images = true
# Announce pane position when switching ("Left pane, 1 of 3")
announce_pane_position = true
# Announce tab details when switching (title, shell, status)
announce_tab_details = true
# Enable audio feedback tones (works without a screen reader)
audio_feedback = false
# Enable progress bar detection tones
audio_progress = true
# Enable error/warning detection tones
audio_errors = true
# Enable command completion tones
audio_command_complete = true
